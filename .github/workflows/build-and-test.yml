name: Build and Test
on:
  push:
    branches:
      - develop
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  # Build main pgserver package (Python code only, no binaries)
  build_main_package:
    name: Build main pgserver package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Remove pginstall directory (main package shouldn't include binaries)
        run: rm -rf src/pgserver/pginstall

      - name: Build main package wheel
        run: python -m build --wheel

      - name: Upload main package wheel
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.whl
          name: main-package-wheels

  # Build PG16 binary wheels for macOS ARM64 and Linux ARM64
  build_binary_wheels:
    name: Build pgserver-postgres-16 on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: build_main_package
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            wheel_platform: macosx_11_0_arm64
            macosx_deployment_target: '11.0'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            wheel_platform: manylinux_2_17_aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Install patchelf (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Restore PostgreSQL build from cache
        id: cache-postgres
        uses: actions/cache@v3
        with:
          path: |
            pgbuild
            src/pgserver/pginstall
          key: ${{ runner.os }}-${{ runner.arch }}-pg16-${{ hashFiles('pgbuild/Makefile') }}

      - name: Build binary package
        working-directory: packages/pgserver-postgres-16
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target || '' }}
        run: |
          make build
          python -m build --wheel

      - name: Retag wheel with platform
        working-directory: packages/pgserver-postgres-16/dist
        run: |
          pip install wheel
          python -m wheel tags --platform-tag=${{ matrix.wheel_platform }} *.whl

      - name: Upload binary package wheels
        uses: actions/upload-artifact@v4
        with:
          path: packages/pgserver-postgres-16/dist/*.whl
          name: binary-wheels-pgserver-postgres-16-${{ matrix.platform }}

  # Create/update "latest" release with all wheels
  release:
    name: Update latest release
    needs:
      - build_binary_wheels
      - build_main_package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: false
          files: dist/*.whl
