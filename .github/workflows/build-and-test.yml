name: Build and Test
on:
  push:
    branches:
      - testing
      - main
      - 'claude/**'  # Allow CI on claude/* branches for testing
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  # Build binary packages for each PostgreSQL version
  build_binary_wheels:
    name: Build ${{ matrix.package }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Temporarily test only PostgreSQL 18 on Linux
        package: [pgserver-postgres-18]
        # package: [pgserver-postgres-16, pgserver-postgres-17, pgserver-postgres-18]
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-12, macos-14, windows-2022]
        # exclude:
        #   # Temporarily exclude Windows until we test Linux/macOS first
        #   - os: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Extract PostgreSQL version from package name
        id: pg-version
        shell: bash
        run: |
          # Extract version from package name (e.g., pgserver-postgres-16 -> 16)
          VERSION="${{ matrix.package }}"
          VERSION="${VERSION##*-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore PostgreSQL build from cache
        id: cache-postgres
        uses: actions/cache@v3
        with:
          path: |
            pgbuild
            src/pgserver/pginstall
          key: ${{ runner.os }}-${{ runner.arch }}-pg${{ steps.pg-version.outputs.version }}-${{ hashFiles('pgbuild/Makefile') }}

      - name: Build binary package (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/${{ matrix.package }}
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && (matrix.os == 'macos-14' && '11.0' || '10.9') || '' }}
        run: |
          make build
          python -m build --wheel

      - name: Build binary package (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/${{ matrix.package }}
        shell: bash
        run: |
          make build
          python -m build --wheel

      - name: Upload binary package wheels
        uses: actions/upload-artifact@v4
        with:
          path: packages/${{ matrix.package }}/dist/*.whl
          name: binary-wheels-${{ matrix.package }}-${{ matrix.os }}

  # Build main pgserver package (Python code only, no binaries)
  build_main_package:
    name: Build main pgserver package
    runs-on: ubuntu-latest
    needs: build_binary_wheels  # Ensure binary packages are built first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Remove pginstall directory (main package shouldn't include binaries)
        run: rm -rf src/pgserver/pginstall

      - name: Build main package wheel
        run: python -m build --wheel

      - name: Upload main package wheel
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.whl
          name: main-package-wheels

  # Publish to PyPI
  publish-to-pypi:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    name: Publish to PyPI
    needs:
      - build_binary_wheels
      - build_main_package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pgserver
    permissions:
      id-token: write
    steps:
      - name: Download all binary wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: binary-wheels-*
          merge-multiple: true

      - name: Download main package wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          name: main-package-wheels

      - name: Flatten dist directory
        run: |
          find dist -name '*.whl' -exec mv {} dist/ \;
          find dist -type d -empty -delete

      - name: Publish all packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
