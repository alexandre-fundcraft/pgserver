[project]
name = "pgserver-postgres-18"
version = "0.2.0"
description = "PostgreSQL 18 binaries for pgserver"
readme = "README.md"
requires-python = ">=3.9"
license = {file = "../../LICENSE.txt"}
authors=[{ name="Oscar Moll", email="orm@csail.mit.edu" }]
keywords=["postgresql", "pgvector"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["pgserver_binaries*"]

[tool.setuptools.package-data]
pgserver_binaries = ["**/*"]

[tool.cibuildwheel]
before-all = "cd ../../ && PGSERVER_VERSION=18 make -C pgbuild"
environment = {PGSERVER_VERSION="18"}

[build-system]
requires = ["setuptools>=58.0.0", "wheel"]
build-backend = "setuptools.build_meta"
